<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Irigasi Tomat</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>"
    />
    <!-- CSS & JS Terpisah -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>
  </head>
  <body class="min-h-screen flex bg-gray-50 overflow-hidden">
    <!-- ================== KOLOM KIRI (Ilustrasi & Deskripsi) ================== -->
    <div
      class="hidden lg:flex flex-col w-3/5 bg-left-panel relative items-center pt-20 px-12"
    >
      <div
        class="relative z-10 flex flex-col items-center text-center max-w-lg"
      >
        <div
          class="w-24 h-24 bg-brand-green rounded-full flex items-center justify-center mb-4 shadow-lg border-4 border-white"
        >
          <i class="fa-solid fa-seedling text-white text-4xl"></i>
        </div>

        <h1 class="text-3xl font-bold text-brand-green mb-1">Irigasi Tomat</h1>
        <p class="text-brand-green font-medium text-sm mb-8">ESP32-C3 Mini</p>

        <h2 class="text-2xl font-bold text-gray-800 mb-3 leading-tight">
          Sistem Irigasi Otomatis<br />Tanaman Tomat
        </h2>
        <p class="text-gray-600 text-sm leading-relaxed">
          Pantau kondisi tanaman tomat secara real-time dan kelola sistem
          irigasi dengan mudah dan efisien.
        </p>
      </div>
    </div>

    <!-- ================== KOLOM KANAN (Form Login) ================== -->
    <div
      class="flex w-full lg:w-2/5 items-center justify-center p-6 sm:p-12 bg-white lg:bg-transparent relative z-20"
    >
      <!-- Kotak Form Utama -->
      <div
        class="bg-white w-full max-w-md rounded-3xl p-8 sm:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-gray-50 animate-fade-in"
      >
        <div class="text-center mb-8">
          <h2 class="text-2xl font-bold text-gray-900 mb-2">Selamat Datang!</h2>
          <p class="text-sm text-gray-500">Silakan masuk untuk melanjutkan</p>
        </div>

        <form
          action="#"
          onsubmit="
            event.preventDefault();
            loginUser();
          "
        >
          <!-- Input Username -->
          <div class="mb-5">
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Username</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"
              >
                <i class="fa-regular fa-envelope"></i>
              </span>
              <input
                type="text"
                id="user-user"
                placeholder="masukkan username Anda"
                class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green text-sm text-gray-700 transition-colors"
                required
              />
            </div>
          </div>

          <!-- Input Password -->
          <div class="mb-5">
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Kata Sandi</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"
              >
                <i class="fa-solid fa-lock text-sm"></i>
              </span>
              <input
                type="password"
                id="user-pass"
                placeholder="masukkan kata sandi"
                class="w-full pl-11 pr-11 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green text-sm text-gray-700 transition-colors"
                required
              />
              <button
                type="button"
                onclick="togglePassword('user-pass', 'user-eye')"
                class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-400 hover:text-brand-green transition-colors"
              >
                <i id="user-eye" class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>

          <!-- Opsi Tambahan -->
          <div class="flex items-center justify-between mb-8">
            <label class="flex items-center cursor-pointer group">
              <input
                type="checkbox"
                class="w-4 h-4 border-gray-300 rounded custom-checkbox"
              />
              <span class="ml-2 text-sm text-gray-600 group-hover:text-gray-800"
                >Ingat saya</span
              >
            </label>
            <a
              href="#"
              class="text-sm font-medium text-blue-500 hover:text-blue-700 hover:underline transition-colors"
              >Lupa kata sandi?</a
            >
          </div>

          <!-- Tombol Submit -->
          <button
            type="submit"
            class="w-full bg-brand-green hover:bg-green-800 text-white font-semibold py-3.5 rounded-lg transition-colors duration-300 shadow-md hover:shadow-lg mb-6"
          >
            Masuk
          </button>

          <!-- Footer Link -->
          <div class="text-center text-sm text-gray-500">
            Belum memiliki akun?
            <a href="#" class="text-brand-green font-semibold hover:underline"
              >Hubungi administrator</a
            >
          </div>
        </form>
      </div>
    </div>

    <!-- Script Utama -->
    <script src="assets/js/main.js"></script>
  </body>
</html>
