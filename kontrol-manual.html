<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontrol Manual - Irigasi Tomat</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>
  </head>
  <body
    class="bg-[#f4f7f4] flex h-screen overflow-hidden font-sans text-gray-800"
    onload="initManualMode()"
  >
    <aside
      class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col justify-between flex-shrink-0 relative overflow-hidden"
    >
      <i
        class="fa-solid fa-seedling absolute -bottom-10 -left-10 text-9xl text-brand-light opacity-40 z-0 transform -rotate-12"
      ></i>
      <div class="relative z-10">
        <div
          class="py-8 px-6 flex items-center space-x-3 border-b border-gray-100 mb-6"
        >
          <div
            class="w-10 h-10 border-2 border-brand-green text-brand-green rounded-full flex items-center justify-center text-xl bg-white shadow-sm"
          >
            <i class="fa-solid fa-droplet"></i>
          </div>
          <div>
            <h1 class="text-lg font-bold text-brand-dark leading-tight">
              Irigasi Tomat
            </h1>
            <p class="text-brand-green font-medium text-[10px]">
              ESP32-C3 Mini
            </p>
          </div>
        </div>
        <nav class="flex flex-col space-y-1 pr-4">
          <a
            href="dashboard.html"
            class="flex items-center space-x-4 text-gray-500 hover:bg-brand-light hover:text-brand-green py-3 pl-8 pr-4 rounded-r-full font-medium transition-all"
            ><i class="fa-solid fa-house w-5 text-center"></i
            ><span>Dashboard</span></a
          >
          <a
            href="monitoring.html"
            class="flex items-center space-x-4 text-gray-500 hover:bg-brand-light hover:text-brand-green py-3 pl-8 pr-4 rounded-r-full font-medium transition-all"
            ><i class="fa-solid fa-chart-simple w-5 text-center"></i
            ><span>Monitoring</span></a
          >
          <a
            href="riwayat-data.html"
            class="flex items-center space-x-4 text-gray-500 hover:bg-brand-light hover:text-brand-green py-3 pl-8 pr-4 rounded-r-full font-medium transition-all"
            ><i class="fa-solid fa-clock-rotate-left w-5 text-center"></i
            ><span>Riwayat Data</span></a
          >
          <a
            href="kontrol-manual.html"
            class="flex items-center space-x-4 bg-brand-green text-white py-3 pl-8 pr-4 rounded-r-full font-medium transition-all shadow-md"
            ><i class="fa-solid fa-faucet-drip w-5 text-center"></i
            ><span>Kontrol Manual</span></a
          >
          <a
            href="pengaturan.html"
            class="flex items-center space-x-4 text-gray-500 hover:bg-brand-light hover:text-brand-green py-3 pl-8 pr-4 rounded-r-full font-medium transition-all"
            ><i class="fa-solid fa-gear w-5 text-center"></i
            ><span>Pengaturan</span></a
          >
          <a
            href="sistem.html"
            class="flex items-center space-x-4 text-gray-500 hover:bg-brand-light hover:text-brand-green py-3 pl-8 pr-4 rounded-r-full font-medium transition-all"
            ><i class="fa-solid fa-server w-5 text-center"></i
            ><span>Sistem</span></a
          >
        </nav>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8 pb-24 md:pb-8">
      <header class="flex justify-between items-center mb-6">
        <div>
          <h2 class="text-xl md:text-2xl font-bold text-gray-800">
            Kontrol Manual
          </h2>
        </div>
        <div
          class="flex items-center space-x-2 bg-white px-3 py-1.5 rounded-full border border-gray-200 shadow-sm"
        >
          <div
            class="w-8 h-8 bg-brand-green rounded-full flex items-center justify-center text-white"
          >
            <i class="fa-solid fa-user text-xs"></i>
          </div>
          <div class="hidden sm:block pr-2">
            <p class="font-bold text-gray-800 text-xs">User</p>
          </div>
        </div>
      </header>

      <div
        class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 mb-4 flex justify-between items-center"
      >
        <div
          class="flex space-x-2 bg-gray-50 p-1 rounded-lg border border-gray-100 w-full"
        >
          <button
            id="btn-mode-otomatis"
            onclick="setMode('otomatis')"
            class="flex-1 flex items-center justify-center space-x-2 py-2 rounded-md font-medium text-sm transition-all duration-300"
          >
            <i class="fa-solid fa-robot"></i><span>Otomatis</span>
          </button>
          <button
            id="btn-mode-manual"
            onclick="setMode('manual')"
            class="flex-1 flex items-center justify-center space-x-2 py-2 rounded-md font-medium text-sm transition-all duration-300"
          >
            <i class="fa-solid fa-hand-pointer"></i><span>Manual</span>
          </button>
        </div>
      </div>

      <!-- Bagian Durasi Override dengan Kolom Input Custom -->
      <div class="mb-6">
        <h3 class="font-bold text-gray-800 text-sm mb-3">Durasi Override</h3>
        <div class="flex flex-wrap gap-2 items-center">
          <button
            id="dur-5"
            onclick="selectDuration('dur-5')"
            class="duration-btn bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm transition-colors shadow-sm"
          >
            5 mnt
          </button>
          <button
            id="dur-10"
            onclick="selectDuration('dur-10')"
            class="duration-btn bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm transition-colors shadow-sm"
          >
            10 mnt
          </button>
          <button
            id="dur-15"
            onclick="selectDuration('dur-15')"
            class="duration-btn bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm transition-colors shadow-sm"
          >
            15 mnt
          </button>

          <!-- Input Custom Waktu -->
          <div
            class="flex items-center space-x-2 bg-white border border-gray-200 rounded-lg shadow-sm px-2 py-1 duration-custom-container"
            id="dur-custom-container"
          >
            <input
              type="number"
              id="custom-dur"
              placeholder="0"
              class="w-12 text-center text-sm font-bold text-gray-800 outline-none"
              oninput="selectCustomDuration()"
            />
            <span class="text-xs text-gray-500 font-medium pr-1">mnt</span>
          </div>
        </div>
      </div>

      <div class="mb-6">
        <h3 class="font-bold text-gray-800 text-sm mb-3">Alasan Override</h3>
        <div class="flex flex-wrap gap-2">
          <button
            id="rsn-1"
            onclick="selectReason('rsn-1')"
            class="reason-btn flex items-center space-x-2 bg-white border border-gray-200 text-gray-600 px-3 py-2 rounded-lg text-sm transition-all shadow-sm"
          >
            <i class="fa-solid fa-wrench text-brand-green"></i
            ><span class="truncate">Kalibrasi Debit</span>
          </button>
          <button
            id="rsn-2"
            onclick="selectReason('rsn-2')"
            class="reason-btn flex items-center space-x-2 bg-white border border-gray-200 text-gray-600 px-3 py-2 rounded-lg text-sm transition-all shadow-sm"
          >
            <i class="fa-solid fa-droplet text-blue-500"></i
            ><span class="truncate">Siram Ekstra</span>
          </button>
        </div>
      </div>

      <div class="flex space-x-3 w-full">
        <button
          id="btn-pompa-on"
          class="flex-1 py-4 rounded-xl font-bold text-white transition-all duration-300 shadow-sm"
        >
          <i class="fa-solid fa-play mr-2"></i>Pompa ON
        </button>
        <button
          id="btn-pompa-off"
          class="flex-1 py-4 rounded-xl font-bold text-white transition-all duration-300 shadow-sm"
        >
          <i class="fa-solid fa-stop mr-2"></i>Pompa OFF
        </button>
      </div>
    </main>

    <nav
      class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-between items-center px-4 h-16 z-50"
    >
      <a
        href="dashboard.html"
        class="flex flex-col items-center text-gray-400 hover:text-brand-green w-1/5"
        ><i class="fa-solid fa-house text-xl mb-1"></i
        ><span class="text-[9px] font-medium">Home</span></a
      >
      <a
        href="monitoring.html"
        class="flex flex-col items-center text-gray-400 hover:text-brand-green w-1/5"
        ><i class="fa-solid fa-chart-simple text-xl mb-1"></i
        ><span class="text-[9px] font-medium">Monitor</span></a
      >
      <a
        href="riwayat-data.html"
        class="flex flex-col items-center text-gray-400 hover:text-brand-green w-1/5"
        ><i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i
        ><span class="text-[9px] font-medium">Riwayat</span></a
      >
      <a
        href="kontrol-manual.html"
        class="flex flex-col items-center text-brand-green w-1/5"
        ><i class="fa-solid fa-faucet-drip text-xl mb-1"></i
        ><span class="text-[9px] font-semibold">Kontrol</span></a
      >
      <a
        href="sistem.html"
        class="flex flex-col items-center text-gray-400 hover:text-brand-green w-1/5"
        ><i class="fa-solid fa-server text-xl mb-1"></i
        ><span class="text-[9px] font-medium">Sistem</span></a
      >
    </nav>

    <script>
      let currentMode = "manual";
      function initManualMode() {
        setMode("manual");
        selectDuration("dur-5");
        selectReason("rsn-2");
      }

      function setMode(mode) {
        currentMode = mode;
        const btnAuto = document.getElementById("btn-mode-otomatis");
        const btnManual = document.getElementById("btn-mode-manual");
        const btnPumpOn = document.getElementById("btn-pompa-on");
        const btnPumpOff = document.getElementById("btn-pompa-off");

        const durBtns = document.querySelectorAll(".duration-btn");
        const rsnBtns = document.querySelectorAll(".reason-btn");
        const customInput = document.getElementById("custom-dur");
        const customContainer = document.getElementById("dur-custom-container");

        if (mode === "otomatis") {
          btnAuto.className =
            "flex-1 flex items-center justify-center space-x-2 py-2 rounded-md font-bold text-sm bg-brand-green text-white shadow-sm transition-all";
          btnManual.className =
            "flex-1 flex items-center justify-center space-x-2 py-2 rounded-md font-medium text-sm text-gray-500 hover:bg-gray-100 transition-all";

          btnPumpOn.className =
            "flex-1 py-4 rounded-xl font-bold text-gray-400 bg-gray-200 cursor-not-allowed transition-all";
          btnPumpOff.className =
            "flex-1 py-4 rounded-xl font-bold text-gray-400 bg-gray-200 cursor-not-allowed transition-all";

          customInput.disabled = true;
          customContainer.classList.add(
            "bg-gray-100",
            "opacity-60",
            "cursor-not-allowed",
          );
          durBtns.forEach(
            (b) =>
              (b.className =
                "duration-btn bg-gray-100 border border-gray-200 text-gray-400 px-4 py-2 rounded-lg text-sm cursor-not-allowed"),
          );
          rsnBtns.forEach(
            (b) =>
              (b.className =
                "reason-btn flex items-center space-x-2 bg-gray-100 border border-gray-200 text-gray-400 px-3 py-2 rounded-lg text-sm cursor-not-allowed opacity-60"),
          );
        } else {
          btnManual.className =
            "flex-1 flex items-center justify-center space-x-2 py-2 rounded-md font-bold text-sm bg-brand-green text-white shadow-sm transition-all";
          btnAuto.className =
            "flex-1 flex items-center justify-center space-x-2 py-2 rounded-md font-medium text-sm text-gray-500 hover:bg-gray-100 transition-all";

          btnPumpOn.className =
            "flex-1 py-4 rounded-xl font-bold text-white bg-brand-green hover:bg-green-800 shadow-sm transition-all";
          btnPumpOff.className =
            "flex-1 py-4 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-sm transition-all";

          customInput.disabled = false;
          customContainer.classList.remove(
            "bg-gray-100",
            "opacity-60",
            "cursor-not-allowed",
            "border-brand-green",
          );
          durBtns.forEach(
            (b) =>
              (b.className =
                "duration-btn bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm hover:border-brand-green hover:text-brand-green cursor-pointer shadow-sm transition-all"),
          );
          rsnBtns.forEach(
            (b) =>
              (b.className =
                "reason-btn flex items-center space-x-2 bg-white border border-gray-200 text-gray-600 px-3 py-2 rounded-lg text-sm hover:border-brand-green shadow-sm cursor-pointer transition-all"),
          );

          selectDuration("dur-5");
          selectReason("rsn-2");
        }
      }

      function selectDuration(id) {
        if (currentMode === "otomatis") return;
        document.getElementById("custom-dur").value = ""; // Kosongkan input custom
        document
          .getElementById("dur-custom-container")
          .classList.remove("border-brand-green", "bg-brand-light");

        document.querySelectorAll(".duration-btn").forEach((btn) => {
          btn.classList.remove(
            "border-brand-green",
            "text-brand-green",
            "font-bold",
            "bg-brand-light",
          );
          btn.classList.add("border-gray-200", "text-gray-600");
        });
        document
          .getElementById(id)
          .classList.add(
            "border-brand-green",
            "text-brand-green",
            "font-bold",
            "bg-brand-light",
          );
      }

      // Ketika user mengetik angka manual
      function selectCustomDuration() {
        if (currentMode === "otomatis") return;
        document.querySelectorAll(".duration-btn").forEach((btn) => {
          btn.classList.remove(
            "border-brand-green",
            "text-brand-green",
            "font-bold",
            "bg-brand-light",
          );
          btn.classList.add("border-gray-200", "text-gray-600");
        });
        const container = document.getElementById("dur-custom-container");
        container.classList.add("border-brand-green", "bg-brand-light");
      }

      function selectReason(id) {
        if (currentMode === "otomatis") return;
        document
          .querySelectorAll(".reason-btn")
          .forEach((b) =>
            b.classList.remove("border-brand-green", "bg-brand-light"),
          );
        document
          .getElementById(id)
          .classList.add("border-brand-green", "bg-brand-light");
      }
    </script>
  </body>
</html>
